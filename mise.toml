[tools]
"github:EmbarkStudios/cargo-deny" = "0.19.9"
gitleaks = "8.30.1"
rust = { version = "1.96.0", profile = "default" }

[tasks.build]
run = "cargo build --workspace"

[tasks.test]
run = "cargo test --workspace"

[tasks.fmt]
run = "cargo fmt --all"

[tasks.lint]
run = [
  "cargo fmt --all --check",
  "cargo clippy --workspace --all-targets -- -D warnings",
]

[tasks."lint:deps"]
run = "cargo deny check"

[tasks."scan:secrets"]
run = "gitleaks detect --redact"

[tasks.ci]
depends = ["lint", "test", "lint:deps", "scan:secrets"]
