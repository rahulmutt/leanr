[tools]
"cargo:cargo-fuzz" = "0.13.2"
"github:EmbarkStudios/cargo-deny" = "0.20.2"
"github:leanprover/elan" = "4.2.3"
gitleaks = "8.30.1"
rust = { version = "1.97.0", profile = "default" }

# leanprover/elan's GitHub release asset ships a self-installing binary named
# `elan-init` (mise pins and verifies *that* exact binary above), not `elan`
# itself. `elan-init` installs the real `elan`/`lean`/`lake` into ~/.elan/bin
# on first run (elan's own toolchain-manager design, independent of mise).
# This makes ~/.elan/bin available to mise-managed shells/tasks.
[env]
_.path = ["{{env.HOME}}/.elan/bin"]

[tasks."elan:bootstrap"]
description = "One-time (idempotent) install of the real elan/lean/lake binaries from the mise-pinned elan-init installer"
run = "sh -c '\"$(mise which elan-init)\" -y --no-modify-path --default-toolchain none'"

[tasks.build]
run = "cargo build --workspace"

[tasks.test]
# No RUST_MIN_STACK here, deliberately (Task 11b review wave 2, Critical 2).
# It used to export 16 MiB because `leanr_syntax`'s minimum-stack contract was a
# precondition on callers and `libtest` runs every test on a 2 MiB thread. That
# is fixed at the source: `parse_module` now spawns its own correctly-sized
# worker, so the contract holds on any thread — including a bare `cargo test`,
# and including Task 12's property/fuzz tests. Setting it here again would only
# hide a regression of that fix.
run = "cargo test --workspace"

[tasks.fmt]
run = "cargo fmt --all"

[tasks.lint]
run = [
  "cargo fmt --all --check",
  "cargo clippy --workspace --all-targets -- -D warnings",
]

[tasks."lint:deps"]
run = "cargo deny check"

[tasks."scan:secrets"]
run = "gitleaks detect --redact"

[tasks."cache:incremental"]
description = "M2c staleness-correctness gate: exact-cone rebuild per perturbed input axis (fast; no toolchain)"
run = "cargo test --package leanr_build --test cache_incremental"

[tasks."cache:remote"]
description = "M2d remote-cache gate: hermetic HTTP CAS — fetch/push/tamper/offline/build-through-remote (fast; no toolchain)"
run = "cargo test --package leanr_build --test cache_remote"

[tasks.ci]
depends = ["lint", "test", "lint:deps", "scan:secrets", "cache:incremental", "cache:remote"]

[tasks."sweep:stdlib"]
description = "Decode every .olean shipped with the pinned toolchain (local; CI has no Lean)"
depends = ["elan:bootstrap"]
run = "sh -c 'LEANR_SWEEP_DIR=\"$(lean --print-libdir)\" cargo test --release --package leanr_olean --test stdlib_sweep -- --ignored --nocapture'"

[tasks."check:stdlib"]
description = "Kernel-check every .olean shipped with the pinned toolchain (local; CI has no Lean)"
depends = ["elan:bootstrap"]
run = "sh -c 'cargo run --release -p leanr_cli -- check --all --path \"$(lean --print-libdir)\"'"

[tasks."check:stdlib:watched"]
description = "check:stdlib under a 30 GiB RSS watchdog (Result-B acceptance gate; local, needs toolchain)"
depends = ["elan:bootstrap"]
run = "scripts/mem-watchdog.sh 30 sh -c 'cargo run --release -p leanr_cli -- check --all --path \"$(lean --print-libdir)\"'"

[tasks."check:stdlib:differential"]
description = "Full-stdlib verdict-equivalence gate: parallel --jobs 1/8 vs sequential replay (local; needs toolchain)"
depends = ["elan:bootstrap"]
run = "scripts/check-differential.sh"

[tasks."fuzz:olean"]
description = "Fuzz the olean decoder (local; needs nightly-2026-07-01, sanitizer flags require a nightly rustc). mise's rust core plugin holds only one rust version at a time (a second `mise use --pin rust@...` silently replaces the pinned 1.96.0 instead of layering a second channel alongside it, which would break `mise run test`), so the nightly is installed and invoked directly via rustup instead of mise: run `rustup toolchain install nightly-2026-07-01` once, then this task uses `cargo +nightly-2026-07-01`. detect_leaks=0: this sandbox drops CAP_SYS_PTRACE, which makes LeakSanitizer's own end-of-run leak check abort (\"LeakSanitizer has encountered a fatal error\", zero-byte artifact) independent of the target; leak detection isn't part of the never-panic guarantee we're fuzzing for."
dir = "crates/leanr_olean"
run = "ASAN_OPTIONS=detect_leaks=0 cargo +nightly-2026-07-01 fuzz run module_data -- -max_total_time=60"

[tasks."fuzz:syntax"]
description = "Fuzz the Lean source parser (never panic, always terminate, total losslessness). Same nightly/leak-detection caveats as fuzz:olean."
dir = "crates/leanr_syntax"
run = "ASAN_OPTIONS=detect_leaks=0 cargo +nightly-2026-07-01 fuzz run parse_module -- -max_total_time=60"

[tasks.fuzz]
depends = ["fuzz:olean", "fuzz:syntax"]

[tasks."fixtures:regen"]
description = "Regenerate oracle golden fixtures (requires the pinned Lean toolchain)"
depends = ["elan:bootstrap"]
run = [
  "lean tests/fixtures/Sample.lean -o tests/fixtures/Sample.olean",
  "lean tests/fixtures/SampleRich.lean -o tests/fixtures/SampleRich.olean",
  # `prelude`-mode, import-free fixture the kernel replays from an empty
  # environment (crates/leanr_olean/tests/check_fixtures.rs).
  "lean tests/fixtures/Prelude0.lean -o tests/fixtures/Prelude0.olean",
  # `module`-mode, `prelude` fixture: emits companion parts
  # `ModPriv.olean{,.server,.private}` (multi-region decode; M1b Task 13a).
  # The single `lean` invocation writes all three parts.
  "lean tests/fixtures/ModPriv.lean -o tests/fixtures/ModPriv.olean",
  # module mode also emits an unused `.ir` companion; drop it (not decoded).
  "rm -f tests/fixtures/ModPriv.ir",
  "sh -c 'lean --run tests/fixtures/dump_decls.lean tests/fixtures/Sample.olean > tests/fixtures/Sample.decls.txt'",
  "sh -c 'lean --run tests/fixtures/dump_decls.lean tests/fixtures/SampleRich.olean > tests/fixtures/SampleRich.decls.txt'",
  "sh -c 'lean --githash > tests/fixtures/oracle-githash.txt'",
  "sh -c 'cd .mathlib && rm -f /tmp/leanr-mathlib-golden.toml && lake translate-config toml /tmp/leanr-mathlib-golden.toml && cp /tmp/leanr-mathlib-golden.toml ../crates/leanr_build/tests/fixtures/mathlib-lakefile-golden.toml'",
  "sh -c 'for p in aesop batteries Cli importGraph LeanSearchClient plausible Qq; do cp .mathlib/.lake/packages/$p/lakefile.toml crates/leanr_build/tests/fixtures/lakefiles/$p.toml; done'",
  # M3a parser fixtures: official parse trees in canonical JSON
  # (tests/fixtures/syntax/; dump_syntax.lean is the dumper itself).
  # `Notation*.lean` (M3b1 same-file notation corpus, Task 8) are
  # EXCLUDED here — they grow their own grammar mid-file, which
  # `dump_syntax.lean`'s parse-only (no elaboration) loop cannot
  # observe; see the `fixtures:regen-notation` task below, which this
  # task also depends on.
  "sh -c 'for f in tests/fixtures/syntax/*.lean; do b=$(basename \"$f\"); case \"$b\" in dump_syntax.lean|dump_syntax_elab.lean|Notation*.lean) continue;; esac; lean --run tests/fixtures/syntax/dump_syntax.lean \"$f\" > \"${f%.lean}.stx.jsonl\"; done'",
  # M3b2a Task 2: synthetic import-notation corpus
  # (tests/fixtures/syntax/import/). NotaDep{,Meta}.olean build against
  # the REAL toolchain Init (bare `lean`, no LEAN_PATH). The importer
  # dumps below set LEAN_PATH=$PWD so `import NotaDep` resolves.
  #
  # Invariant (not just "build order"): the committed stub `Init.olean`
  # must NOT EXIST on disk while any dep build or importer dump below
  # runs. `SearchPath.findWithExt` matches the FIRST search-path root
  # with either a `pkg/` dir OR a `pkg.olean` file, so once
  # LEAN_PATH=$PWD is set, a stub `Init.olean` sitting in this SAME
  # directory shadows the real Init's submodules (e.g.
  # `Init.Data.List.Impl`) before the builtin sysroot entry is ever
  # tried, breaking every importer dump with "object file ... does not
  # exist". This is not merely avoided by running Init.olean's build
  # last on a clean checkout — it's the fixture's OWN prior output
  # sitting there from the previous regen that shadows it, so a
  # committed `Init.olean` breaks every regen after the first unless
  # it's removed first. Hence: `rm -f Init.olean` UNCONDITIONALLY as
  # the very first step of this sequence, then dep builds, then
  # dumps, then rebuild the stub `Init.olean` LAST. The stub is only
  # ever consumed by leanr-side (Rust) hermetic tests, not by these
  # `lean --run` dumps.
  "sh -c 'cd tests/fixtures/syntax/import && rm -f Init.olean'",
  "sh -c 'cd tests/fixtures/syntax/import && lean NotaDep.lean -o NotaDep.olean && lean NotaDepMeta.lean -o NotaDepMeta.olean'",
  "sh -c 'cd tests/fixtures/syntax/import && for f in ImportMixfix ImportMunch ImportCat; do LEAN_PATH=$PWD lean --run ../dump_syntax.lean $f.lean > $f.stx.jsonl; done'",
  "sh -c 'cd tests/fixtures/syntax/import && LEAN_PATH=$PWD lean --run ../dump_syntax_elab.lean ImportOverload.lean > ImportOverload.stx.jsonl'",
  "sh -c 'cd tests/fixtures/syntax/import && lean Init.lean -o Init.olean'",
]
depends_post = ["fixtures:regen-notation"]

[tasks."fixtures:regen-notation"]
description = "Regenerate the M3b1 same-file-notation oracle dumps (dump_syntax_elab.lean — ELABORATES each command so a notation/mixfix declaration's grammar growth is live for later commands, unlike the parse-only dump_syntax.lean; see that file's module doc). Run standalone, or via fixtures:regen (depends_post)."
depends = ["elan:bootstrap"]
run = [
  # `NotationBadResync.lean` is an intentionally malformed fixture
  # (round-trip-only — oracle_golden.rs treats a missing .stx.jsonl as
  # "not oracle-compared"), so it's excluded here, same as every other
  # error fixture (Errors0.lean/Errors1.lean) is excluded from the
  # M3a loop above.
  "sh -c 'for f in tests/fixtures/syntax/Notation*.lean; do [ -e \"$f\" ] || continue; [ \"$(basename $f)\" = NotationBadResync.lean ] && continue; lean --run tests/fixtures/syntax/dump_syntax_elab.lean \"$f\" > \"${f%.lean}.stx.jsonl\"; done'",
]

[tasks."fixtures:mutations"]
description = "Regenerate the mutation-differential fixtures (requires the pinned toolchain)"
depends = ["elan:bootstrap"]
run = [
  # Hermetic base: an import-free `prelude` module whose whole constant set
  # replays from an empty kernel env (no toolchain needed at test time).
  "lean tests/fixtures/MutBase.lean -o tests/fixtures/MutBase.olean",
  # Hermetic mutation set (committed, CI-green): mutate `MutBase`, emit
  # `Mutations0.olean` + `mutations0-verdicts.jsonl`.
  "sh -c 'lean --run tests/fixtures/mutate.lean MutBase tests/fixtures/Mutations0.olean > tests/fixtures/mutations0-verdicts.jsonl'",
  # Toolchain-dependent mutation set (committed; diff test is #[ignore]d):
  # mutate `Init.Core`, emit `Mutations.olean` + `mutations-verdicts.jsonl`.
  "sh -c 'lean --run tests/fixtures/mutate.lean Init.Core tests/fixtures/Mutations.olean > tests/fixtures/mutations-verdicts.jsonl'",
]

[tasks."mathlib:fetch"]
description = "One-time: clone Mathlib at ./mathlib-pin and `lake exe cache get` its prebuilt .oleans (network; local only)"
depends = ["elan:bootstrap"]
run = "scripts/mathlib-fetch.sh"

[tasks."check:mathlib"]
description = "Kernel-check all of pinned Mathlib in parallel (needs mathlib:fetch first). Verified empirically: a package's oleans land at <pkg>/.lake/build/lib/lean (not .../lib), and each of Mathlib's ~15 dependencies (Batteries, Aesop, Qq, ...) builds separately under .mathlib/.lake/packages/<dep>/.lake/build/lib/lean — so this uses `lake env printenv LEAN_PATH` (run from inside .mathlib) to get Lake's own resolved closure instead of a single hardcoded --path."
depends = ["elan:bootstrap"]
run = "sh -c 'LEAN_PATH=\"$(cd .mathlib && lake env printenv LEAN_PATH)\" cargo run --release -p leanr_cli -- check --all'"

[tasks."parse:mathlib"]
description = "M3b2a Mathlib parse sweep vs the pass-list ratchet (needs mathlib:fetch). LEANR_SWEEP_LIMIT=N for a smoke run."
depends = ["elan:bootstrap"]
run = "sh -c 'LEANR_MATHLIB_DIR=\"$PWD/.mathlib\" LEANR_OLEAN_PATH=\"$(cd .mathlib && lake env printenv LEAN_PATH)\" cargo test --release -p leanr_grammar --test mathlib_sweep -- --ignored --nocapture'"

[tasks."passlist:update"]
description = "Rewrite tests/fixtures/syntax/mathlib-passlist.txt from a fresh sweep (review the diff before committing)"
depends = ["elan:bootstrap"]
# LEANR_SWEEP_LIMIT="" neutralizes any smoke-run limit leaked in from the
# calling shell's environment (e.g. a prior `LEANR_SWEEP_LIMIT=N mise run
# parse:mathlib` smoke check): mathlib_sweep.rs parses it via
# `.and_then(|s| s.parse().ok())`, so an empty string fails to parse →
# None → unwrap_or(usize::MAX), i.e. unlimited. A leaked non-empty limit
# here would silently truncate the pass-list this task writes.
run = "sh -c 'LEANR_SWEEP_LIMIT=\"\" LEANR_PASSLIST_UPDATE=1 LEANR_MATHLIB_DIR=\"$PWD/.mathlib\" LEANR_OLEAN_PATH=\"$(cd .mathlib && lake env printenv LEAN_PATH)\" cargo test --release -p leanr_grammar --test mathlib_sweep -- --ignored --nocapture'"

[tasks."build:differential"]
description = "M2 differential oracles vs pinned lake: M2a bridge/import/module-set + M2b probe-project artifact byte-diff (needs mathlib:fetch + elan)"
depends = ["elan:bootstrap"]
run = [
  "sh -c 'LEANR_MATHLIB_DIR=\"$PWD/.mathlib\" LEANR_OLEAN_PATH=\"$(cd .mathlib && lake env printenv LEAN_PATH)\" cargo test --release -p leanr_build --test mathlib_oracle -- --ignored --nocapture'",
  "cargo test --release -p leanr_build --test lake_build_oracle -- --ignored --nocapture",
]

[tasks."build:acceptance"]
description = "M2b acceptance: fresh clone of pinned Mathlib, full `leanr build`, every artifact byte-diffed vs lake's (hours; network; local only)"
depends = ["elan:bootstrap"]
run = "scripts/build-fresh-acceptance.sh"

[tasks."parse:acceptance"]
description = "M3a acceptance: fresh oracle dumps vs committed, golden+property gates, CLI dump diff, fuzz smoke (local; needs toolchain + nightly)"
depends = ["elan:bootstrap"]
run = "scripts/parse-acceptance.sh"

[tasks."bench:mathlib"]
description = "Benchmark leanr vs lean4checker over pinned Mathlib on this pod (needs mathlib:fetch)"
depends = ["elan:bootstrap"]
run = "scripts/bench-mathlib.sh"
