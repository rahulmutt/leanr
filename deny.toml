[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
allow = [
  "Apache-2.0",
  # LLVM exception is a permissive addition to Apache-2.0; pulled in by
  # `ar_archive_writer`, a build-dependency of `psm`/`stacker` (the
  # sanctioned kernel TCB recursion dep).
  "Apache-2.0 WITH LLVM-exception",
  "MIT",
  # BSD-2-Clause is pulled in by `arrayref`, a dependency of `blake3`.
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Zlib",
  # CDLA-Permissive-2.0 from webpki-roots (ureq‚Üírustls‚Üíwebpki-roots, M2d remote cache)
  "CDLA-Permissive-2.0",
]

[bans]
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
